# Meta Ads Daily Review - Threshold Configuration
# Edit these values as the funnel matures. Skill reads this file at runtime.

thresholds:
  # CTR-based verdicts
  ctr_kill: 0.008          # 0.8% - below this flagged for kill (after impression floor)
  ctr_target: 0.015        # 1.5% - healthy baseline
  ctr_scale_signal: 0.025  # 2.5% - priority scale candidate

  # Budget and conversion
  cost_per_call_target_gbp: 50
  landing_page_booking_rate: 0.08   # 8%

  # Budget split (Warm / Cold Lookalike / Cold Interest)
  budget_split:
    warm_retargeting: 0.50
    cold_lookalike: 0.30
    cold_interest: 0.20
  budget_split_tolerance: 0.05      # ±5% before flagging

  # Impression floor for trustworthy verdicts
  min_impressions_per_adset: 1000

  # Spend concentration warning
  spend_concentration_warn: 0.40    # one creative >40% of ad set spend

# Week phase rules - dictates what verdicts are allowed
week_phases:
  1:
    label: "Data collection"
    allow_kill: false
    allow_scale: false
    focus: "watch only"
  2:
    label: "First decisions"
    allow_kill: true
    allow_scale: true
    focus: "kill/scale on creatives with >3000 impressions"
  3:
    label: "Copy testing"
    allow_kill: true
    allow_scale: true
    focus: "statement vs metric vs question hook variants"
  4:
    label: "Copy testing"
    allow_kill: true
    allow_scale: true
    focus: "rank hook variants, roll out winner"
  5:
    label: "Copy testing"
    allow_kill: true
    allow_scale: true
    focus: "finalise hook variant, move to scale"
  6:
    label: "Scale"
    allow_kill: true
    allow_scale: true
    focus: "scale winners, rotate losers"

# Learning phase guardrails
learning_phase:
  min_conversions_before_changes: 50  # Meta's 50 conversion event rule
  directional_verdicts_only: true     # all verdicts marked directional until learning complete

# Meta quality ranking flags to act on
quality_flags:
  - BELOW_AVERAGE_AVERAGE_20
  - BELOW_AVERAGE_AVERAGE_10
  - BELOW_AVERAGE
